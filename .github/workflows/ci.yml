name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Отримання коду (Checkout)
      uses: actions/checkout@v4

    - name: Встановлення Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Встановлення залежностей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Встановлюємо системні бібліотеки SDL для Pygame
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Перевірка стилю коду (Flake8)
      run: |
        flake8 . --format=html --htmldir=flake8-report
      continue-on-error: true # Продовжити роботу, навіть якщо є попередження щодо стилю

    - name: Запуск тестів (Pytest)
      env:
        SDL_VIDEODRIVER: dummy # Віртуальний монітор
      run: |
        pytest --html=pytest-report/report.html --self-contained-html

    - name: Збереження звіту Flake8 (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: flake8-html-report
        path: flake8-report/

    - name: Збереження звіту Pytest (Artifact)
      uses: actions/upload-artifact@v4
      if: always() # Зберегти звіт, навіть якщо тести впадуть
      with:
        name: pytest-html-report
        path: pytest-report/